name: Auto Generate Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/console/src/**'

concurrency:
  group: auto-generate
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for source changes
        id: changes
        run: |
          echo "=== git log ==="
          git log --oneline -3
          echo "=== changed src files ==="
          CHANGED=$(git diff HEAD~1 --name-only --diff-filter=ACMR -- 'apps/console/src/' | wc -l | tr -d ' ')
          echo "count=$CHANGED" >> $GITHUB_OUTPUT
          echo "$CHANGED source file(s) changed."
          git diff HEAD~1 --name-only --diff-filter=ACMR -- 'apps/console/src/' || true

      - name: Install dependencies
        if: steps.changes.outputs.count != '0'
        run: npm install
        working-directory: apps/console

      - name: Generate Tests
        if: steps.changes.outputs.count != '0'
        run: bash scripts/generate-tests.sh
        working-directory: apps/console

      - name: Dedup Check
        if: steps.changes.outputs.count != '0'
        run: bash scripts/dedup-tests.sh
        working-directory: apps/console

      - name: Check for generated files
        id: generated
        if: steps.changes.outputs.count != '0'
        run: |
          NEW_FILES=$(git status --porcelain apps/console/tests/auto-generated/ | wc -l | tr -d ' ')
          echo "count=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "$NEW_FILES new test file(s) generated."

      - name: Create PR with generated tests
        if: steps.changes.outputs.count != '0' && steps.generated.outputs.count != '0'
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="test/auto-${TIMESTAMP}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add apps/console/tests/auto-generated/
          git commit -m "test: auto-generated E2E tests ($(date +%Y-%m-%d))"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "test: auto-generated E2E tests ($(date +%Y-%m-%d))" \
            --body "## Auto-Generated Tests

          Claude가 main의 코드 변경을 분석하여 자동 생성한 E2E 테스트입니다.

          **리뷰 필요:** 이 PR은 자동 머지되지 않습니다. 사람이 확인 후 머지해주세요.

          ### 확인 사항
          - [ ] 테스트가 실제 사용자 시나리오를 반영하는가?
          - [ ] false positive assertion이 없는가?
          - [ ] 기존 테스트와 중복되지 않는가?" \
            --base main \
            --head "$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
