name: Main Merge Safety Net

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/console/src/**'
      - 'apps/console/tests/**'

concurrency:
  group: main-merge
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  pages: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: apps/console
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Full Tests
        run: npx playwright test --retries=2
        env:
          CI: true

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results -o allure-report --clean || true
        continue-on-error: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-main
          path: apps/console/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Deploy Allure to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/console/allure-report
          destination_dir: allure
          keep_files: true
        continue-on-error: true

      - name: Publish Test Summary
        if: always()
        run: npx github-actions-ctrf ctrf/ctrf-report.json || true

      - name: Slack Notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: eventName,job,workflow,author,repo,commit,ref
          if_mention: failure,cancelled
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
