name: PR E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write
  packages: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # NODE_AUTH_TOKEN: not needed for lab
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    defaults:
      run:
        working-directory: apps/console
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run Playwright Tests
        id: test
        run: npx playwright test --retries=2
        continue-on-error: true
        env:
          CI: true
          PLAYWRIGHT_ENV: 'production'

      - name: Healing Attempt (if tests failed)
        id: heal
        if: steps.test.outcome == 'failure'
        run: bash scripts/heal.sh 2
        continue-on-error: true
        env:
          CI: true
          PLAYWRIGHT_ENV: 'production'

      - name: Auto Fixme (if healing failed)
        if: steps.test.outcome == 'failure' && steps.heal.outcome == 'failure'
        run: bash scripts/auto-fixme.sh

      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results -o allure-report --clean 2>/dev/null || echo "Allure generation skipped"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: apps/console/playwright-report/
          retention-days: 30

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-report-pr-${{ github.event.pull_request.number }}
          path: apps/console/allure-report/
          retention-days: 30

      - name: Publish Test Summary Results
        if: always()
        run: npx github-actions-ctrf ctrf/ctrf-report.json

      - name: Fail if tests and healing both failed
        if: steps.test.outcome == 'failure' && steps.heal.outcome == 'failure'
        run: exit 1
