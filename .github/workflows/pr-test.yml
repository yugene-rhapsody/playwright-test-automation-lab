name: PR E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: apps/console
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Detect changed domains
        id: domains
        run: |
          CHANGED=$(git diff origin/main --name-only --diff-filter=ACMR -- 'apps/console/src/' || true)
          echo "=== Changed files ==="
          echo "$CHANGED"

          # 도메인 감지 후 실제 존재하는 디렉토리만 포함
          PROJECTS=""
          check_domain() {
            local keyword="$1" dir="$2"
            if echo "$CHANGED" | grep -qi "$keyword"; then
              if [ -d "apps/console/$dir" ] && [ -n "$(find apps/console/$dir -name '*.spec.ts' 2>/dev/null | head -1)" ]; then
                PROJECTS="$PROJECTS $dir"
                echo "  Matched: $keyword → $dir"
              else
                echo "  Matched keyword '$keyword' but no tests in $dir"
              fi
            fi
          }

          check_domain "campaign" "tests/campaign/"
          check_domain "creative" "tests/creative/"
          check_domain "ad-unit\|adunit" "tests/ad-unit/"
          check_domain "setting" "tests/settings/"
          check_domain "dashboard" "tests/dashboard/"
          check_domain "payment\|billing" "tests/payments/"
          check_domain "auth\|login" "tests/auth/"
          check_domain "report" "tests/report/"
          check_domain "navigation\|sidebar" "tests/navigation/"
          check_domain "onboarding" "tests/onboarding/"
          check_domain "targeting" "tests/targeting/"
          check_domain "app-crud" "tests/app-crud/"
          check_domain "adproduct" "tests/adproduct/"
          check_domain "event" "tests/event/"
          check_domain "property" "tests/property/"

          # 매칭된 도메인이 없거나 테스트 디렉토리가 없으면 전체 실행
          if [ -z "$PROJECTS" ]; then
            PROJECTS="tests/"
            echo "No matching domain tests found. Running all tests."
          fi

          echo "test_paths=$PROJECTS" >> $GITHUB_OUTPUT
          echo "=== Will run: $PROJECTS ==="
        working-directory: .

      - name: Run Tests
        run: npx playwright test ${{ steps.domains.outputs.test_paths }} --retries=2
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: apps/console/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Publish Test Summary
        if: always()
        run: npx github-actions-ctrf ctrf/ctrf-report.json || true

      - name: Slack Notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: eventName,job,workflow,author,repo,commit,ref
          if_mention: failure,cancelled
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
