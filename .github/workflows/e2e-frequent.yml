name: E2E CRUD Tests (6시간마다)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,6,12,18 * * *'

concurrency:
  group: e2e-crud
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  packages: read
  id-token: write

jobs:
  test-crud:
    runs-on: ubuntu-latest
    env:
      # NODE_AUTH_TOKEN: not needed for lab
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    defaults:
      run:
        working-directory: apps/console
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run CRUD Tests
        id: test
        run: npx playwright test --project=crud --retries=2
        continue-on-error: true
        env:
          CI: true
          PLAYWRIGHT_ENV: 'production'

      - name: Advanced Healing (max 2 attempts)
        id: heal
        if: steps.test.outcome == 'failure'
        run: bash scripts/heal.sh 2
        continue-on-error: true
        env:
          CI: true
          PLAYWRIGHT_ENV: 'production'

      - name: Auto Fixme (if healing failed)
        if: steps.test.outcome == 'failure' && steps.heal.outcome == 'failure'
        run: bash scripts/auto-fixme.sh

      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results -o allure-report --clean 2>/dev/null || echo "Allure generation skipped"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-crud-${{ github.run_number }}
          path: apps/console/playwright-report/
          retention-days: 30

      - name: Publish Test Summary Results
        if: always()
        run: npx github-actions-ctrf ctrf/ctrf-report.json || true
