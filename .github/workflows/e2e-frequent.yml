name: E2E CRUD Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,6,12,18 * * *'

concurrency:
  group: e2e-crud
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: apps/console
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run CRUD Tests
        run: npx playwright test --project=crud --retries=2
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-crud-${{ github.run_number }}
          path: apps/console/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Publish Test Summary
        if: always()
        run: npx github-actions-ctrf ctrf/ctrf-report.json || true

      - name: Slack Notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: eventName,job,workflow,author,repo,commit,ref
          if_mention: failure,cancelled
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
